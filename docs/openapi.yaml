      responses:
        '200':
          description: FHIR R5 Bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FhirBundle'
        '400':
          description: Validation or conversion error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationError:
                  summary: Schema validation error
                  value:
                    error: "JSON validation failed: <field>: <message>"
                emptyPayload:
                  summary: Empty payload error
                  value:
                    error: "JSON validation failed: At least one resource section is required (patient, encounter, medication, medication_request, medication_statement, medication_administration, capability_statement, operation_outcome, parameters, care_plan, care_team, goal, service_request, procedure, condition, appointment, schedule, slot, diagnostic_report, related_person, location, episode_of_care, specimen, imaging_study, allergy_intolerance, immunization, practitioner, practitioner_role, organization)."
  /convert:
    post:
      tags: [Convert]
      summary: Convert mixed input (auto-detect)
      description: |
        Accepts JSON body with an input string, or raw text/XML body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertRequest'
          text/plain:
            schema:
              type: string
          application/xml:
            schema:
              type: string
      parameters:
        - in: query
          name: format
          schema:
            type: string
          description: Optional input format override
        - in: query
          name: fhirVersion
          schema:
            type: string
            enum: [r5]
          description: FHIR output version (default r5)
      responses:
        '200':
          description: FHIR R5 Bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FhirBundle'
        '400':
          description: Validation or conversion error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /convert/upload:
    post:
      tags: [Upload]
      summary: Upload file for conversion
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                format:
                  type: string
                  description: Optional file format override
                fhirVersion:
                  type: string
                  enum: [r5]
      responses:
        '200':
          description: FHIR R5 Bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FhirBundle'
        '400':
          description: Validation or conversion error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /convert/hl7:
    post:
      tags: [Convert]
      summary: Convert HL7 input to FHIR R5 Bundle
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertRequest'
      parameters:
        - in: query
          name: format
          schema:
            type: string
          description: Optional input format override
        - in: query
          name: fhirVersion
          schema:
            type: string
            enum: [r5]
          description: FHIR output version (default r5)
      responses:
        '200':
          description: FHIR R5 Bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FhirBundle'
        '400':
          description: Validation or conversion error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    ConvertRequest:
      type: object
      properties:
        input:
          type: string
        format:
          type: string
        fhirVersion:
          type: string
          enum: [r5]
      required: [input]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
    CustomJsonInput:
      type: object
      description: At least one resource section is required (patient, encounter, medication, medication_request, medication_statement, medication_administration, capability_statement, operation_outcome, parameters, care_plan, care_team, goal, service_request, task, communication, communication_request, questionnaire, procedure, condition, appointment, schedule, slot, diagnostic_report, related_person, location, episode_of_care, specimen, imaging_study, allergy_intolerance, immunization, practitioner, practitioner_role, organization).
      properties:
        operation:
          type: string
          enum: [create, update, delete]
        messageType:
          type: string
        patient:
          oneOf:
            - $ref: '#/components/schemas/CustomPatient'
            - type: array
              items:
                $ref: '#/components/schemas/CustomPatient'
        encounter:
          oneOf:
            - $ref: '#/components/schemas/CustomEncounter'
            - type: array
              items:
                $ref: '#/components/schemas/CustomEncounter'
        medication:
          oneOf:
            - $ref: '#/components/schemas/CustomMedication'
            - type: array
              items:
                $ref: '#/components/schemas/CustomMedication'
        medication_request:
          oneOf:
            - $ref: '#/components/schemas/CustomMedicationRequest'
            - type: array
              items:
                $ref: '#/components/schemas/CustomMedicationRequest'
        medication_statement:
          oneOf:
            - $ref: '#/components/schemas/CustomMedicationStatement'
            - type: array
              items:
                $ref: '#/components/schemas/CustomMedicationStatement'
        medication_administration:
          oneOf:
            - $ref: '#/components/schemas/CustomMedicationAdministration'
            - type: array
              items:
                $ref: '#/components/schemas/CustomMedicationAdministration'
        capability_statement:
          oneOf:
            - $ref: '#/components/schemas/CustomCapabilityStatement'
            - type: array
              items:
                $ref: '#/components/schemas/CustomCapabilityStatement'
        operation_outcome:
          oneOf:
            - $ref: '#/components/schemas/CustomOperationOutcome'
            - type: array
              items:
                $ref: '#/components/schemas/CustomOperationOutcome'
        parameters:
          oneOf:
            - $ref: '#/components/schemas/CustomParameters'
            - type: array
              items:
                $ref: '#/components/schemas/CustomParameters'
        care_plan:
          oneOf:
            - $ref: '#/components/schemas/CustomCarePlan'
            - type: array
              items:
                $ref: '#/components/schemas/CustomCarePlan'
        care_team:
          oneOf:
            - $ref: '#/components/schemas/CustomCareTeam'
            - type: array
              items:
                $ref: '#/components/schemas/CustomCareTeam'
        goal:
          oneOf:
            - $ref: '#/components/schemas/CustomGoal'
            - type: array
              items:
                $ref: '#/components/schemas/CustomGoal'
        service_request:
          oneOf:
            - $ref: '#/components/schemas/CustomServiceRequest'
            - type: array
              items:
                $ref: '#/components/schemas/CustomServiceRequest'
        task:
          oneOf:
            - $ref: '#/components/schemas/CustomTask'
            - type: array
              items:
