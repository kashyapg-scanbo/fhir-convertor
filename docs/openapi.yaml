                - $ref: '#/components/schemas/CustomJsonMedicationDispenseOnly'
                - $ref: '#/components/schemas/CustomJsonCapabilityStatementOnly'
                - $ref: '#/components/schemas/CustomJsonOperationOutcomeOnly'
                - $ref: '#/components/schemas/CustomJsonParametersOnly'
                - $ref: '#/components/schemas/CustomJsonCarePlanOnly'
                - $ref: '#/components/schemas/CustomJsonCareTeamOnly'
                - $ref: '#/components/schemas/CustomJsonGoalOnly'
                - $ref: '#/components/schemas/CustomJsonServiceRequestOnly'
                - $ref: '#/components/schemas/CustomJsonTaskOnly'
                - $ref: '#/components/schemas/CustomJsonCommunicationOnly'
                - $ref: '#/components/schemas/CustomJsonCommunicationRequestOnly'
                - $ref: '#/components/schemas/CustomJsonQuestionnaireOnly'
