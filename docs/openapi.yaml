openapi: 3.0.3
info:
  title: Scanbo FHIR Converter API
  version: 1.1.0
  description: |
    Convert custom JSON, HL7v2, CDA, CSV, and Excel into FHIR R5 Bundles.
servers:
  - url: http://localhost:3000
    description: Local
tags:
  - name: Custom JSON
  - name: Convert
  - name: Upload
paths:
  /json:
