      responses:
        '200':
          description: FHIR R5 Bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FhirBundle'
        '400':
          description: Validation or conversion error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationError:
                  summary: Schema validation error
                  value:
                    error: "JSON validation failed: <field>: <message>"
                emptyPayload:
                  summary: Empty payload error
                  value:
                    error: "JSON validation failed: At least one resource section is required (patient, encounter, medication, medication_request, medication_statement, medication_administration, medication_dispense, device_dispense, device_request, device_usage, encounter_history, flag, list, nutrition_intake, nutrition_order, risk_assessment, capability_statement, operation_outcome, parameters, care_plan, care_team, goal, service_request, procedure, condition, appointment, appointment_response, claim, claim_response, composition, explanation_of_benefit, coverage, binary, schedule, slot, diagnostic_report, related_person, location, episode_of_care, specimen, imaging_study, allergy_intolerance, immunization, practitioner, practitioner_role, organization)."
  /convert:
    post:
      tags: [Convert]
      summary: Convert mixed input (auto-detect)
      description: |
        Accepts JSON body with an input string, or raw text/XML body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertRequest'
          text/plain:
            schema:
              type: string
          application/xml:
            schema:
              type: string
      parameters:
        - in: query
          name: format
          schema:
            type: string
          description: Optional input format override
        - in: query
          name: fhirVersion
          schema:
            type: string
            enum: [r5]
          description: FHIR output version (default r5)
      responses:
        '200':
          description: FHIR R5 Bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FhirBundle'
        '400':
          description: Validation or conversion error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /convert/upload:
    post:
      tags: [Upload]
      summary: Upload file for conversion
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                format:
                  type: string
                  description: Optional file format override
                fhirVersion:
                  type: string
                  enum: [r5]
      responses:
        '200':
          description: FHIR R5 Bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FhirBundle'
        '400':
