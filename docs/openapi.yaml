      summary: Convert HL7 input to FHIR R5 Bundle
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertRequest'
      parameters:
        - in: query
          name: format
          schema:
            type: string
          description: Optional input format override
        - in: query
          name: fhirVersion
          schema:
            type: string
            enum: [r5]
          description: FHIR output version (default r5)
      responses:
        '200':
          description: FHIR R5 Bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FhirBundle'
        '400':
          description: Validation or conversion error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
