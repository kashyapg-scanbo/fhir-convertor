openapi: 3.0.3
info:
  title: Scanbo FHIR Converter API
  version: 1.1.0
  description: |
    Convert custom JSON, HL7v2, CDA, CSV, and Excel into FHIR R5 Bundles.
servers:
  - url: http://localhost:3000
    description: Local
tags:
  - name: Custom JSON
  - name: Convert
  - name: Upload
paths:
  /json:
    post:
      tags: [Custom JSON]
      summary: Convert custom JSON to FHIR R5 Bundle
      description: |
        Accepts global custom JSON (snake_case).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/CustomJsonPatientOnly'
                - $ref: '#/components/schemas/CustomJsonEncounterOnly'
                - $ref: '#/components/schemas/CustomJsonMedicationOnly'
                - $ref: '#/components/schemas/CustomJsonMedicationRequestOnly'
                - $ref: '#/components/schemas/CustomJsonMedicationAdministrationOnly'
                - $ref: '#/components/schemas/CustomJsonCapabilityStatementOnly'
                - $ref: '#/components/schemas/CustomJsonOperationOutcomeOnly'
                - $ref: '#/components/schemas/CustomJsonParametersOnly'
                - $ref: '#/components/schemas/CustomJsonCarePlanOnly'
                - $ref: '#/components/schemas/CustomJsonCareTeamOnly'
                - $ref: '#/components/schemas/CustomJsonGoalOnly'
                - $ref: '#/components/schemas/CustomJsonServiceRequestOnly'
                - $ref: '#/components/schemas/CustomJsonTaskOnly'
                - $ref: '#/components/schemas/CustomJsonCommunicationOnly'
                - $ref: '#/components/schemas/CustomJsonCommunicationRequestOnly'
                - $ref: '#/components/schemas/CustomJsonQuestionnaireOnly'
                - $ref: '#/components/schemas/CustomJsonPractitionerOnly'
                - $ref: '#/components/schemas/CustomJsonPractitionerRoleOnly'
                - $ref: '#/components/schemas/CustomJsonOrganizationOnly'
                - $ref: '#/components/schemas/CustomJsonLocationOnly'
                - $ref: '#/components/schemas/CustomJsonEpisodeOfCareOnly'
                - $ref: '#/components/schemas/CustomJsonSpecimenOnly'
                - $ref: '#/components/schemas/CustomJsonImagingStudyOnly'
                - $ref: '#/components/schemas/CustomJsonAllergyIntoleranceOnly'
                - $ref: '#/components/schemas/CustomJsonImmunizationOnly'
                - $ref: '#/components/schemas/CustomJsonFull'
            examples:
              patient:
                summary: Patient
                value:
                  patient:
                    patient_id: P-10001
                    ihi: "1234098753"
                    name:
                      first_name: John
                      middle_name: A.
                      last_name: Doe
                    date_of_birth: 1980-05-15
                    gender: male
                    contact_info:
                      phone: "+1-555-555-5555"
                      email: john.doe@example.com
                      address:
                        street: 123 Main St
                        city: Springfield
                        state: IL
                        postal_code: 62701
                        country: USA
                    marital_status: married
                    language: English
                    ethnicity: Caucasian
                    emergency_contact:
                      name: Jane Doe
                      relationship: spouse
                      phone: "+1-555-555-5556"
                    insurance:
                      provider: Good Health Insurance
                      policy_number: GH123456789
                      coverage_start_date: 2020-01-01
                      coverage_end_date: 2025-01-01
                    medical_history:
                      allergies:
                        - Penicillin
                        - Peanuts
                      current_medications:
                        - Lisinopril
                        - Atorvastatin
                      past_illnesses:
                        - Hypertension
                        - Asthma
                      surgeries:
                        - surgery_name: Appendectomy
                          surgery_date: 2000-06-15
                        - surgery_name: Knee Replacement
